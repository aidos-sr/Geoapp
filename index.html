<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>География 8</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

<!-- ══════════════════════════════════════════════
  🔥 FIREBASE SETUP — өз мәндеріңізді қойыңыз!
  
  1. https://console.firebase.google.com/ → Жаңа жоба
  2. Authentication → Sign-in method → Email/Password → ҚОСУ
  3. Realtime Database → Деректер базасы жасау → Test mode
  4. Жоба параметрлері (⚙️) → Веб қолданба → Config-ті алыңыз
  5. Төмендегі firebaseConfig-ті алмастырыңыз
══════════════════════════════════════════════ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyArwDELpm7FMM6WLS7VyDYnpc_1HoRhw_4",
    authDomain: "geoapp8.firebaseapp.com",
    databaseURL: "https://geoapp8-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "geoapp8",
    storageBucket: "geoapp8.firebasestorage.app",
    messagingSenderId: "953761935267",
    appId: "1:953761935267:web:400863a9ec16bfb41bb416",
    measurementId: "G-TNZKCFDT6C"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // Global-ға шығарамыз (ескі JS кодымен байланысу үшін)
  window._fbAuth = auth;
  window._fbDb = db;
  window._fbFns = { set, get, ref, update, onValue,
    createUserWithEmailAndPassword, signInWithEmailAndPassword,
    signOut, onAuthStateChanged };

  // Auth state listener
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      // Firebase user бар — профильді тек оқу
      const snap = await get(ref(db, 'users/' + user.uid));
      if (snap.exists()) {
        const data = snap.val();
        window._fbUser = { uid: user.uid, email: user.email, ...data };
        startSession(window._fbUser);
      } else {
        // Профиль жоқ — жаңа дерек
        window._fbUser = { uid: user.uid, email: user.email, login: user.email.split('@')[0], cls: '', isAdmin: false };
        await set(ref(db, 'users/' + user.uid), { login: window._fbUser.login, cls: '', isAdmin: false, createdAt: Date.now() });
        startSession(window._fbUser);
      }
    } else {
      window._fbUser = null;
      showAuthScreen();
    }
  });
</script>

<style>
:root{
  --g:#16a34a;--gd:#14532d;--gl:#4ade80;--gll:#dcfce7;
  --acc:#f59e0b;--red:#ef4444;--blue:#3b82f6;
  --bg:#f0fdf4;--card:#fff;--text:#14532d;--muted:#6b7280;
  --shadow:0 4px 24px rgba(22,163,74,.12);--r:18px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;max-width:480px;margin:0 auto;}
.screen{display:none;min-height:100vh;padding-bottom:80px;}
.screen.active{display:block;}

/* LOADING */
#loadingScreen{
  position:fixed;inset:0;background:linear-gradient(160deg,#14532d 0%,#16a34a 55%,#f59e0b 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:999;transition:opacity .4s ease;
}
#loadingScreen.fade-out{opacity:0;pointer-events:none;}
.spin{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .75s linear infinite;margin-bottom:20px;}
@keyframes spin{to{transform:rotate(360deg)}}
.load-logo{font-family:'Unbounded',sans-serif;font-size:28px;font-weight:900;color:#fff;margin-bottom:8px;}
.load-txt{color:rgba(255,255,255,.8);font-family:'Nunito',sans-serif;font-size:14px;}

/* AUTH — фотодағыдай Login/Register tabs */
#authScreen{
  background:linear-gradient(160deg,#14532d 0%,#16a34a 55%,#f59e0b 100%);
  flex-direction:column;align-items:center;justify-content:flex-end;
  min-height:100vh;padding-bottom:0;
}
#authScreen.active{display:flex;}
.auth-top{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px 0;}
.auth-logo{font-family:'Unbounded',sans-serif;font-size:26px;font-weight:900;color:#fff;text-align:center;margin-bottom:6px;}
.auth-sub{color:rgba(255,255,255,.75);font-size:13px;text-align:center;}

/* Bottom sheet style card */
.auth-sheet{
  background:#fff;border-radius:28px 28px 0 0;padding:0 24px 40px;
  width:100%;max-width:480px;box-shadow:0 -8px 40px rgba(0,0,0,.2);
}
/* Login / Register tab bar */
.auth-tabs{display:flex;border-bottom:1px solid #f3f4f6;margin-bottom:24px;}
.auth-tab{flex:1;padding:18px 0 14px;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;text-align:center;cursor:pointer;color:var(--muted);border:none;background:none;border-bottom:3px solid transparent;transition:all .2s;margin-bottom:-1px;}
.auth-tab.act{color:var(--g);border-bottom-color:var(--g);}

.inp-wrap{margin-bottom:14px;}
.inp-label{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;display:block;}
.inp{width:100%;padding:13px 16px;border:2px solid #e5e7eb;border-radius:12px;font-family:'Nunito',sans-serif;font-size:15px;color:var(--text);outline:none;transition:border .2s;background:#fff;}
.inp:focus{border-color:var(--g);}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-family:'Unbounded',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:transform .15s;}
.btn:active{transform:scale(.97);}
.btn-g{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;margin-top:2px;}
.auth-err{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px;font-weight:700;}
.auth-divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:12px;}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:#e5e7eb;}
.firebase-badge{display:flex;align-items:center;justify-content:center;gap:5px;margin-top:14px;color:var(--muted);font-size:11px;}

/* HEADER */
.header{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;padding:16px 16px 12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 16px rgba(0,0,0,.2);}
.hrow{display:flex;align-items:center;gap:10px;}
.hback{background:rgba(255,255,255,.15);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:18px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0;}
.hback.show{display:flex;}
.htitle{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;flex:1;text-align:center;line-height:1.2;}
.hlang{background:var(--acc);border:none;color:#1a1a1a;font-family:'Unbounded',sans-serif;font-weight:700;font-size:11px;padding:5px 12px;border-radius:20px;cursor:pointer;flex-shrink:0;}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:#fff;border-top:1px solid #e5e7eb;display:flex;z-index:50;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.nb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:9px 0 11px;cursor:pointer;font-size:10px;font-weight:700;color:var(--muted);border:none;background:none;font-family:'Nunito',sans-serif;letter-spacing:.3px;transition:color .2s;}
.nb.act{color:var(--g);}
.nb-icon{font-size:22px;margin-bottom:2px;}

/* BANNER */
.banner{background:linear-gradient(150deg,var(--gd) 0%,var(--g) 60%,#ca8a04 100%);color:#fff;padding:24px 18px 30px;position:relative;overflow:hidden;}
.banner::before{content:'🌍';font-size:90px;position:absolute;top:-10px;right:-10px;opacity:.09;}
.banner h2{font-family:'Unbounded',sans-serif;font-size:20px;font-weight:900;margin-bottom:5px;}
.banner p{font-size:12px;opacity:.8;}
.bstats{display:flex;gap:10px;margin-top:16px;}
.bstat{background:rgba(255,255,255,.15);border-radius:12px;padding:9px 12px;flex:1;text-align:center;}
.bstat-n{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:900;}
.bstat-l{font-size:10px;opacity:.8;margin-top:1px;}

/* SECTION LABEL */
.slabel{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;padding:16px 16px 7px;}

/* TOPIC LIST */
.tlist{padding:0 12px 8px;display:flex;flex-direction:column;gap:8px;}
.tcard{background:var(--card);border-radius:var(--r);padding:13px 15px;display:flex;align-items:center;gap:11px;cursor:pointer;box-shadow:var(--shadow);border-left:4px solid var(--gl);transition:transform .15s;}
.tcard:active{transform:scale(.98);}
.tcard.done{border-left-color:var(--acc);}
.tnum{background:var(--g);color:#fff;width:34px;height:34px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0;}
.tcard.done .tnum{background:var(--acc);}
.tinfo{flex:1;}
.ttitle{font-weight:700;font-size:13px;line-height:1.3;margin-bottom:3px;}
.tmeta{font-size:11px;color:var(--muted);display:flex;align-items:center;gap:5px;flex-wrap:wrap;}
.badge{background:var(--gll);color:var(--g);font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;}
.badge.done{background:#fef3c7;color:#b45309;}

/* DETAIL */
.dwrap{padding:18px 15px 24px;}
.det-badge{display:inline-block;background:var(--g);color:#fff;font-size:10px;font-weight:700;padding:3px 11px;border-radius:20px;margin-bottom:9px;}
.det-title{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;color:var(--gd);margin-bottom:12px;line-height:1.3;}
.det-body{font-size:14px;line-height:1.85;color:#374151;}
.det-body p{margin-bottom:12px;}
.det-body strong{color:var(--gd);}
.fact-box{background:var(--gll);border-left:4px solid var(--gl);border-radius:10px;padding:11px 13px;margin:12px 0;font-size:13px;}
.fact-title{font-weight:800;color:var(--gd);margin-bottom:4px;font-size:12px;}

/* TASK */
.tsec{margin-top:16px;background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);}
.thead{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--gd);margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.tq{font-size:14px;font-weight:700;color:var(--text);margin-bottom:11px;line-height:1.4;}
.opt{width:100%;text-align:left;padding:11px 13px;border:2px solid #e5e7eb;border-radius:12px;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;cursor:pointer;margin-bottom:7px;transition:all .2s;color:var(--text);}
.opt.correct{border-color:var(--g)!important;background:var(--gll)!important;color:var(--gd)!important;font-weight:700;}
.opt.wrong{border-color:var(--red)!important;background:#fef2f2!important;color:var(--red)!important;}
.opt:disabled{cursor:default;}
.open-inp{width:100%;min-height:88px;padding:11px 13px;border:2px solid #e5e7eb;border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;resize:none;outline:none;color:var(--text);}
.open-inp:focus{border-color:var(--g);}
.tsub{margin-top:9px;padding:12px;border:none;border-radius:12px;background:var(--g);color:#fff;font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;width:100%;cursor:pointer;}
.tres{margin-top:9px;padding:11px;border-radius:12px;text-align:center;font-weight:700;font-size:13px;}
.tres.ok{background:var(--gll);color:var(--gd);}
.tres.ko{background:#fef2f2;color:var(--red);}
.schip{display:inline-flex;align-items:center;gap:3px;background:var(--acc);color:#fff;border-radius:20px;padding:3px 10px;font-size:11px;font-weight:700;}

/* MAP TASK */
.map-wrap{position:relative;border-radius:12px;overflow:hidden;border:2px solid #e5e7eb;margin-bottom:10px;background:#e8f4f8;}
.map-wrap img{width:100%;display:block;user-select:none;}
.map-dot{position:absolute;width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;cursor:pointer;transform:translate(-50%,-50%);box-shadow:0 2px 8px rgba(0,0,0,.3);transition:transform .2s;}
.map-dot:hover{transform:translate(-50%,-50%) scale(1.2);}
.map-dot.unanswered{background:var(--acc);}
.map-dot.answered-ok{background:var(--g);}
.map-dot.answered-ko{background:var(--red);}
.map-opts{display:flex;flex-wrap:wrap;gap:7px;margin-top:10px;}
.map-opt{padding:8px 13px;border:2px solid #e5e7eb;border-radius:10px;background:#fff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .2s;}
.map-opt.selected{border-color:var(--g);background:var(--gll);color:var(--gd);}
.map-inst{font-size:12px;color:var(--muted);margin-bottom:8px;line-height:1.5;}

/* PROFILE */
.phero{background:linear-gradient(135deg,var(--gd),var(--g));color:#fff;padding:28px 20px 22px;text-align:center;}
.avatar{width:68px;height:68px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:30px;margin:0 auto 10px;}
.pname{font-family:'Unbounded',sans-serif;font-size:17px;font-weight:700;margin-bottom:3px;}
.pcls{font-size:12px;opacity:.8;}
.pstats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;padding:14px;}
.pstat{background:var(--card);border-radius:13px;padding:12px 8px;text-align:center;box-shadow:var(--shadow);}
.pstat-n{font-family:'Unbounded',sans-serif;font-size:19px;font-weight:900;color:var(--g);}
.pstat-l{font-size:10px;color:var(--muted);margin-top:2px;font-weight:700;}
.done-item{background:var(--card);border-radius:11px;padding:11px 13px;margin-bottom:7px;display:flex;align-items:center;gap:9px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.done-title{font-size:12px;font-weight:700;}
.done-pts{font-size:11px;color:var(--muted);}
.logout-btn{margin:4px 16px 16px;padding:13px;border:2px solid var(--red);border-radius:13px;background:transparent;color:var(--red);font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;width:calc(100% - 32px);cursor:pointer;}

/* ADMIN */
.adm-wrap{padding:14px;}
.adm-sec{background:var(--card);border-radius:var(--r);padding:16px;box-shadow:var(--shadow);margin-bottom:12px;}
.adm-title{font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;color:var(--gd);margin-bottom:12px;}
.adm-row{display:flex;align-items:center;gap:7px;padding:9px 0;border-bottom:1px solid #f3f4f6;}
.adm-row:last-child{border-bottom:none;}
.adm-nm{flex:1;font-size:13px;font-weight:600;}
.abtn{padding:6px 11px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.aedit{background:var(--gll);color:var(--gd);}
.adel{background:#fef2f2;color:var(--red);}
.adm-add{width:100%;padding:11px;border:2px dashed var(--gl);border-radius:11px;background:transparent;color:var(--g);font-family:'Unbounded',sans-serif;font-size:11px;font-weight:700;cursor:pointer;margin-top:7px;}
.adm-inp{width:100%;padding:10px 13px;border:2px solid #e5e7eb;border-radius:11px;font-family:'Nunito',sans-serif;font-size:14px;outline:none;margin-bottom:9px;color:var(--text);background:#fff;}
.adm-inp:focus{border-color:var(--g);}
.adm-ta{width:100%;min-height:75px;padding:10px 13px;border:2px solid #e5e7eb;border-radius:11px;font-family:'Nunito',sans-serif;font-size:13px;outline:none;resize:none;margin-bottom:9px;color:var(--text);background:#fff;}
.adm-ta:focus{border-color:var(--g);}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:flex-end;}
.overlay.show{display:flex;}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:22px 18px 30px;width:100%;max-height:85vh;overflow-y:auto;}
.modal-title{font-family:'Unbounded',sans-serif;font-size:14px;font-weight:700;color:var(--gd);margin-bottom:16px;}
.modal-close{float:right;background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);margin-top:-4px;}
.hidden{display:none!important;}

/* SYNC INDICATOR */
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4ade80;display:inline-block;margin-left:6px;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.offline-banner{background:#fef3c7;border-bottom:1px solid #fde68a;padding:7px 14px;font-size:11px;font-weight:700;color:#92400e;text-align:center;display:none;}
.offline-banner.show{display:block;}
</style>
</head>
<body>

<!-- ═══ LOADING (fixed position overlay) ═══ -->
<div id="loadingScreen">
  <div class="load-logo">🌍 ГЕО 8</div>
  <div class="spin"></div>
  <div class="load-txt">Firebase жүктелуде...</div>
</div>

<!-- ═══ AUTH ═══ -->
<div id="authScreen" class="screen">
  <div class="auth-top">
    <div class="auth-logo">🌍 ГЕО 8</div>
    <div class="auth-sub">8-сынып Geography қолданбасы</div>
  </div>
  <div class="auth-sheet">
    <!-- Login / Register tabs -->
    <div class="auth-tabs">
      <button class="auth-tab act" id="tabLogin" onclick="setAuthMode(false)">Кіру</button>
      <button class="auth-tab" id="tabReg" onclick="setAuthMode(true)">Тіркелу</button>
    </div>
    <div class="inp-wrap">
      <label class="inp-label">Email</label>
      <input class="inp" id="inLogin" placeholder="email@gmail.com" type="email" autocomplete="username">
    </div>
    <div class="inp-wrap">
      <label class="inp-label">Пароль</label>
      <input class="inp" id="inPass" type="password" placeholder="••••••••" autocomplete="current-password">
    </div>
    <div class="inp-wrap hidden" id="regExtra">
      <label class="inp-label">Сынып (мысалы: 8А)</label>
      <input class="inp" id="inClass" placeholder="8А">
    </div>
    <div class="auth-err" id="authErr"></div>
    <button class="btn btn-g" id="authBtn" onclick="doAuth()">Кіру</button>
    <div class="firebase-badge">🔒 Firebase арқылы қорғалған</div>
  </div>
</div>

<!-- ═══ MAIN ═══ -->
<div id="mainScreen" class="screen">
  <div class="offline-banner" id="offlineBanner">📡 Интернет жоқ — офлайн режим</div>
  <div class="header">
    <div class="hrow">
      <button class="hback" id="backBtn" onclick="goBack()">←</button>
      <div class="htitle" id="hTitle">8-сынып Географиясы<span class="sync-dot" id="syncDot" title="Firebase қосылған"></span></div>
      <button class="hlang" id="langBtn" onclick="toggleLang()">РУС</button>
    </div>
  </div>

  <div id="tabTopics" class="tab"></div>
  <div id="tabProfile" class="tab hidden"></div>
  <div id="tabAdmin" class="tab hidden"></div>

  <div class="bnav">
    <button class="nb act" id="nb0" onclick="switchTab(0)">
      <span class="nb-icon">📚</span><span id="nb0l">Тақырыптар</span>
    </button>
    <button class="nb" id="nb1" onclick="switchTab(1)">
      <span class="nb-icon">👤</span><span id="nb1l">Профиль</span>
    </button>
    <button class="nb hidden" id="nb2" onclick="switchTab(2)">
      <span class="nb-icon">⚙️</span><span>Админ</span>
    </button>
  </div>
</div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="overlay" id="editModal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title" id="modalTitle">Тақырыпты өңдеу</div>
    <label class="inp-label">Тақырып атауы (ҚАЗ)</label>
    <input class="adm-inp" id="mTKk" placeholder="Тақырып атауы">
    <label class="inp-label">Тема названия (РУС)</label>
    <input class="adm-inp" id="mTRu" placeholder="Название темы">
    <label class="inp-label">Мәтін (ҚАЗ)</label>
    <textarea class="adm-ta" id="mTxtKk" rows="3" placeholder="Параграф мәтіні..."></textarea>
    <label class="inp-label">Текст (РУС)</label>

// OFFLINE DETECT

window.addEventListener('online',  () => document.getElementById('offlineBanner').classList.remove('show'));
window.addEventListener('offline', () => document.getElementById('offlineBanner').classList.add('show'));

// ════════════════════════════════════
// FIREBASE HELPERS
// ════════════════════════════════════
async function fbGetProg(uid) {
  try {
    if (!window._fbDb) return {};
    const {get, ref} = window._fbFns;
    const snap = await get(ref(window._fbDb, 'progress/' + uid));
    return snap.exists() ? snap.val() : {};
  } catch { return {}; }
}

async function fbSaveProg(uid, prog) {
  try {
    if (!window._fbDb) return;
    const {set, ref} = window._fbFns;
    await set(ref(window._fbDb, 'progress/' + uid), prog);
  } catch(e) { console.warn('Save error:', e); }
}

async function fbGetTopics() {
  try {
    if (!window._fbDb) return null;
    const {get, ref} = window._fbFns;
    const snap = await get(ref(window._fbDb, 'topics'));
    return snap.exists() ? Object.values(snap.val()) : null;
  } catch { return null; }
}

async function fbSaveTopics(topics) {
  try {
    if (!window._fbDb) return;
    const {set, ref} = window._fbFns;
    const obj = {};
    topics.forEach((t,i) => obj[i] = t);
    await set(ref(window._fbDb, 'topics'), obj);
  } catch(e) { console.warn('Topics save error:', e); }
}

async function fbGetAllUsers() {
  try {
    if (!window._fbDb) return [];
    const {get, ref} = window._fbFns;
    const snap = await get(ref(window._fbDb, 'users'));
    if (!snap.exists()) return [];
    return Object.entries(snap.val()).map(([uid, d]) => ({uid, ...d}));
  } catch { return []; }
}

async function fbGetAllProgress() {
  try {
    if (!window._fbDb) return {};
    const {get, ref} = window._fbFns;
    const snap = await get(ref(window._fbDb, 'progress'));
    return snap.exists() ? snap.val() : {};
  } catch { return {}; }
}

// ════════════════════════════════════
// LOCAL FALLBACK STORAGE
// ════════════════════════════════════
const LS = {
  get(k){try{return JSON.parse(localStorage.getItem(k));}catch{return null;}},
  set(k,v){localStorage.setItem(k,JSON.stringify(v));}
};

function pk(uid, id, type){ return uid + '__' + id + '__' + type; }

// In-memory progress cache
let _prog = {};
let _topics = null;

async function getProg() {
  if (!window._fbUser) return _prog;
  if (Object.keys(_prog).length === 0) {
    _prog = await fbGetProg(window._fbUser.uid);
  }
  return _prog;
}

async function saveProg(p) {
  _prog = p;
  if (window._fbUser) {
    await fbSaveProg(window._fbUser.uid, p);
  }
}

async function getTopics() {
  if (_topics) return _topics;
  const fbT = await fbGetTopics();
  if (fbT && fbT.length > 0) {
    _topics = fbT;
  } else {
    _topics = DEF_TOPICS;
    // İlk kez Firebase'e kaydet
    await fbSaveTopics(_topics);
  }
  return _topics;
}

async function saveTopics(t) {
  _topics = t;
  await fbSaveTopics(t);
}

function calcPts(uid, T, prog) {
  return T.reduce((s,t) => {
    s += (prog[pk(uid,t.id,'test')]||0) + (prog[pk(uid,t.id,'open')]||0) + (prog[pk(uid,t.id,'map')]||0);
    return s;
  }, 0);
}

// ════════════════════════════════════

let isRegMode = false;

function hideLoading(){
  const ls = document.getElementById('loadingScreen');
  ls.classList.add('fade-out');
  setTimeout(()=>{ ls.style.display='none'; }, 450);
}

function showAuthScreen(){
  hideLoading();
  document.getElementById('mainScreen').classList.remove('active');
  document.getElementById('authScreen').classList.add('active');
  // Форманы тазалау
  document.getElementById('inLogin').value='';
  document.getElementById('inPass').value='';
  document.getElementById('authErr').textContent='';
  setAuthMode(false);
}

function setAuthMode(reg){
  isRegMode = reg;
  document.getElementById('tabLogin').classList.toggle('act', !reg);
  document.getElementById('tabReg').classList.toggle('act', reg);
  document.getElementById('regExtra').classList.toggle('hidden', !reg);
  document.getElementById('authBtn').textContent = reg ? 'Тіркелу' : 'Кіру';
  document.getElementById('authErr').textContent = '';
}

function toggleReg(){ setAuthMode(!isRegMode); }

async function doAuth(){
  const email = document.getElementById('inLogin').value.trim();
  const pass  = document.getElementById('inPass').value.trim();
  const cls   = document.getElementById('inClass').value.trim();
  const err   = document.getElementById('authErr');
  const btn   = document.getElementById('authBtn');
  err.textContent = '';
  if(!email){ err.textContent='Email енгізіңіз!'; return; }
  if(!pass) { err.textContent='Пароль енгізіңіз!'; return; }

  btn.textContent = '⏳ Жүктелуде...';
  btn.disabled = true;

  const { createUserWithEmailAndPassword, signInWithEmailAndPassword } = window._fbFns;
  const auth = window._fbAuth;

  try {
    if(isRegMode){
      const cred = await createUserWithEmailAndPassword(auth, email, pass);
      // onAuthStateChanged handles the rest
      const {set, ref} = window._fbFns;
      const login = email.split('@')[0];
      await set(ref(window._fbDb, 'users/' + cred.user.uid), {
        login, cls: cls||'8', isAdmin: false, email, createdAt: Date.now()
      });
    } else {
      await signInWithEmailAndPassword(auth, email, pass);
    }
  } catch(e){
    const msgs = {
      'auth/user-not-found':'Пайдаланушы табылмады!',
      'auth/wrong-password':'Пароль қате!',
      'auth/invalid-credential':'Логин немесе пароль қате!',
      'auth/email-already-in-use':'Бұл email тіркелген!',
      'auth/weak-password':'Пароль кем дегенде 6 символ болуы керек!',
      'auth/invalid-email':'Email форматы қате!'
    };
    err.textContent = msgs[e.code] || ('Қате: ' + e.message);
    btn.textContent = isRegMode ? 'Тіркелу' : 'Кіру';
    btn.disabled = false;
  }
}

function startSession(u){
  ST.currentUser = u;
  _prog = {}; // reset cache
  hideLoading();
  document.getElementById('authScreen').classList.remove('active');
  document.getElementById('mainScreen').classList.add('active');
  document.getElementById('nb2').classList.toggle('hidden', !u.isAdmin);
  switchTab(0);
  document.getElementById('authBtn').textContent = isRegMode ? 'Тіркелу' : 'Кіру';
  document.getElementById('authBtn').disabled = false;
}

async function logout(){
  const {signOut} = window._fbFns;
  _prog = {}; _topics = null;
  await signOut(window._fbAuth);
  ST.currentUser = null;
  document.getElementById('mainScreen').classList.remove('active');
  showAuthScreen();
}

function switchTab(t){
  ST.tab=t; ST.view='list';
  document.getElementById('backBtn').classList.remove('show');
  ['nb0','nb1','nb2'].forEach((id,i)=>document.getElementById(id).classList.toggle('act',i===t));

    const mp=prog[pk(u.uid,t.id,'map')]||0;

// ANSWER HANDLERS
// ════════════════════════════════════
async function answerTest(idx, optIdx, correct){
  const letters=['A','B','C','D'];
  const chosen = letters[optIdx];
  const isOk = chosen === correct;
  for(let i=0;i<4;i++){
    const b=document.getElementById('opt'+i);
    if(b){
      b.disabled=true;
      if(letters[i]===correct) b.classList.add('correct');
      else if(i===optIdx&&!isOk) b.classList.add('wrong');
    }
  }
  if(isOk){
    const T = await getTopics();
    const t = T[idx];
    const prog = await getProg();
    prog[pk(ST.currentUser.uid, t.id, 'test')] = 5;
    await saveProg(prog);
    setTimeout(()=>{
      const sec=document.querySelector('.tsec');
      if(sec) sec.querySelector('.tq').insertAdjacentHTML('afterend','<div class="tres ok">✅ Дұрыс! +5 балл</div>');
    },600);
  } else {
    setTimeout(()=>{
      const firstSec=document.querySelector('.tsec');
      if(firstSec) firstSec.insertAdjacentHTML('beforeend','<div class="tres ko">❌ '+(ST.lang==='kk'?'Қате! Қайта оқыңыз':'Неверно! Перечитайте')+'</div>');
    },600);
  }
}

async function submitOpen(idx){
  const T = await getTopics();
  const t = T[idx];
  const ans = document.getElementById('openAns').value.trim();
  if(ans.length<10){ alert(ST.lang==='kk'?'Кем дегенде 10 символ жазыңыз!':'Напишите хотя бы 10 символов!'); return; }
  const prog = await getProg();
  prog[pk(ST.currentUser.uid, t.id, 'open')] = 3;
  await saveProg(prog);
  const openSec = document.querySelectorAll('.tsec')[1];
  if(openSec){
    const ta=openSec.querySelector('.open-inp');
    const sb=openSec.querySelector('.tsub');
    if(ta) ta.remove();
    if(sb) sb.remove();
    openSec.insertAdjacentHTML('beforeend','<div class="tres ok">✅ '+(ST.lang==='kk'?'Қабылданды! +3 балл':'Принято! +3 баллов')+'</div>');
  }
}

function selectMapOpt(opt, oi){
  ST.selectedMapOpt=opt;
  document.querySelectorAll('.map-opt').forEach(b=>b.classList.remove('selected'));
  const btn=document.getElementById('mopt'+oi);
  if(btn) btn.classList.add('selected');
}

async function tapDot(topicIdx, dotIdx){
  if(!ST.selectedMapOpt){ alert(ST.lang==='kk'?'Алдымен жауапты таңдаңыз!':'Сначала выберите ответ!'); return; }
  ST.mapAnswers[dotIdx]=ST.selectedMapOpt;
  // Update SVG dot color to green (selected)
  updateSVGDot(dotIdx, 'ok');
  const T = await getTopics();
  const t = T[topicIdx];
  const allAnswered = (t.mapDots||[]).every((_,i)=>ST.mapAnswers[i]!==undefined);
  const sbtn=document.getElementById('mapSubmitBtn');
  if(sbtn&&allAnswered){ sbtn.style.opacity='1'; sbtn.style.pointerEvents='auto'; }
}

async function submitMap(topicIdx){
  const T = await getTopics();
  const t = T[topicIdx];
  let correct=0;
  (t.mapDots||[]).forEach((d,i)=>{
    const answered=ST.mapAnswers[i];
    if(answered===d.correct){ correct++; updateSVGDot(i,'ok'); }
    else { updateSVGDot(i,'ko'); }
  });
  const total=(t.mapDots||[]).length;
  const pts=correct>=total?4:correct>0?2:0;
  if(pts>0){
    const prog = await getProg();
    prog[pk(ST.currentUser.uid, t.id, 'map')] = pts;
    await saveProg(prog);
  }
  const mapSec=document.querySelectorAll('.tsec')[2];
  if(mapSec){
    const sbtn=document.getElementById('mapSubmitBtn');
    if(sbtn) sbtn.remove();
    mapSec.insertAdjacentHTML('beforeend',`<div class="tres ${pts>0?'ok':'ko'}">${pts>0?'✅':'❌'} ${correct}/${total} дұрыс · +${pts} балл</div>`);
  }
}

function goBack(){
  ST.view='list';
  document.getElementById('backBtn').classList.remove('show');
  renderTopicsAsync();
}

    <div class="slabel">${lang==='kk'?'ОРЫНДАЛҒАН ТАПСЫРМАЛАР':'ВЫПОЛНЕННЫЕ ЗАДАНИЯ'}</div>
    <div style="padding:0 14px 8px">${doneH}</div>
    <button class="logout-btn" onclick="logout()">🚪 ${lang==='kk'?'Шығу':'Выйти'}</button>`;
  document.getElementById('hTitle').textContent = lang==='kk'?'Профиль':'Профиль';
  showOnly('tabProfile');
}

// ════════════════════════════════════
// ADMIN
// ════════════════════════════════════
let editIdx=null;

async function renderAdminAsync(){
  const T = await getTopics();
  const {lang} = ST;
  let rows='';
  T.forEach((t,i)=>{
    rows+=`<div class="adm-row">
      <div class="adm-nm">${i+1}. ${t[lang]}</div>
      <button class="abtn aedit" onclick="openEdit(${i})">✏️</button>
      <button class="abtn adel" onclick="delTopicAsync(${i})">🗑</button>
    </div>`;
  });

  const allUsers = await fbGetAllUsers();
  const students = allUsers.filter(u=>!u.isAdmin);
  const allProg = await fbGetAllProgress();
  let studH='';
  students.forEach(u=>{
    const uprog = allProg[u.uid]||{};
    const pts = calcPts(u.uid, T, uprog);
    const done = T.filter(t=>uprog[pk(u.uid,t.id,'test')]||uprog[pk(u.uid,t.id,'open')]||uprog[pk(u.uid,t.id,'map')]).length;
    studH+=`<div class="adm-row">
      <div class="adm-nm">👤 ${u.login||u.email} (${u.cls||''})</div>
      <span style="font-size:12px;color:var(--muted)">${done}/${T.length} · <b style="color:var(--acc)">${pts} балл</b></span>
    </div>`;
  });
  if(!students.length) studH=`<p style="font-size:12px;color:var(--muted);padding:6px">${lang==='kk'?'Оқушылар тіркелмеген':'Ученики не зарегистрированы'}</p>`;

  document.getElementById('tabAdmin').innerHTML=`<div class="adm-wrap">
    <div class="adm-sec"><div class="adm-title">📚 ${lang==='kk'?'ТАҚЫРЫПТАР':'ТЕМЫ'}</div>${rows}
    <button class="adm-add" onclick="openEdit(-1)">+ ${lang==='kk'?'Жаңа тақырып':'Добавить тему'}</button></div>
    <div class="adm-sec"><div class="adm-title">👥 ${lang==='kk'?'ОҚУШЫЛАР (Firebase)':'УЧЕНИКИ (Firebase)'}</div>${studH}</div>
  </div>`;
  document.getElementById('hTitle').textContent = lang==='kk'?'Админ панелі':'Панель Админа';
  showOnly('tabAdmin');
}

async function delTopicAsync(i){
  if(!confirm(ST.lang==='kk'?'Өшіресіз бе?':'Удалить?')) return;
  const T = await getTopics();
  T.splice(i,1);
  await saveTopics(T);
  renderAdminAsync();
}

async function openEdit(i){
  editIdx=i;
  const T = await getTopics();
  document.getElementById('modalTitle').textContent = i===-1?(ST.lang==='kk'?'Жаңа тақырып':'Добавить тему'):(ST.lang==='kk'?'Өңдеу':'Редактировать');
  if(i>=0){
    const t=T[i];
    document.getElementById('mTKk').value=t.kk||'';
    document.getElementById('mTRu').value=t.ru||'';
    document.getElementById('mTxtKk').value=strip(t.tkk||'');
    document.getElementById('mTxtRu').value=strip(t.tru||'');
    document.getElementById('mQKk').value=t.qkk||'';
    document.getElementById('mQAns').value=t.ans||'A';
    document.getElementById('mA').value=t.opts?.[0]||'';
    document.getElementById('mB').value=t.opts?.[1]||'';
    document.getElementById('mC').value=t.opts?.[2]||'';
    document.getElementById('mD').value=t.opts?.[3]||'';
    document.getElementById('mOpenQ').value=t.openq||'';
  } else {
    ['mTKk','mTRu','mTxtKk','mTxtRu','mQKk','mQAns','mA','mB','mC','mD','mOpenQ'].forEach(id=>document.getElementById(id).value='');
  }
  document.getElementById('editModal').classList.add('show');
}

function closeModal(){ document.getElementById('editModal').classList.remove('show'); }

async function saveModal(){
  const kk=document.getElementById('mTKk').value.trim();
  if(!kk){alert('Тақырып атауын жазыңыз!');return;}
  const T = await getTopics();
  const entry={
    id: editIdx>=0?T[editIdx].id:Date.now(),
    kk, ru:document.getElementById('mTRu').value.trim(),
    tkk:`<p>${document.getElementById('mTxtKk').value.trim()}</p>`,
    tru:`<p>${document.getElementById('mTxtRu').value.trim()}</p>`,
    qkk:document.getElementById('mQKk').value.trim(),
    ans:document.getElementById('mQAns').value.trim().toUpperCase()||'A',
    opts:[document.getElementById('mA').value.trim(),document.getElementById('mB').value.trim(),document.getElementById('mC').value.trim(),document.getElementById('mD').value.trim()],
    openq:document.getElementById('mOpenQ').value.trim(),
    mapq:'', mapImg:'', mapDots:[], mapOpts:[]
  };
  if(editIdx>=0){
    entry.mapq=T[editIdx].mapq||'';
    entry.mapImg=T[editIdx].mapImg||'';
    entry.mapDots=T[editIdx].mapDots||[];
    entry.mapOpts=T[editIdx].mapOpts||[];
    T[editIdx]=entry;
  } else T.push(entry);
  await saveTopics(T);
  closeModal();
  renderAdminAsync();
}

function strip(html){ return html.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim(); }

// ════════════════════════════════════
// SVG MAP BUILDER
// ════════════════════════════════════
function buildMapSVG(t, topicIdx){
  const dots = t.mapDots || [];
  const W = 360, H = 200;
  // Background gradient based on topic
  const bgs = {
    1:'#0a1628', 2:'#1a3a5c', 3:'#0d2137',
    4:'#2d6a4f', 5:'#1b4332', 6:'#0c2340',
    7:'#164e63', 8:'#14532d', 9:'#1e3a2f', 10:'#1a365d'
  };
  const bg = bgs[t.id] || '#1a3a5c';

  // Simple visual patterns per topic type
  const patterns = {
    1: `<!-- Solar system -->
      <ellipse cx="40" cy="100" rx="30" ry="30" fill="#FDB813" opacity=".9"/>
      <ellipse cx="110" cy="100" rx="6" ry="6" fill="#b5b5b5" opacity=".8"/>
      <ellipse cx="155" cy="100" rx="9" ry="9" fill="#e8cda0" opacity=".8"/>
      <ellipse cx="205" cy="100" rx="11" ry="11" fill="#4fa8e8" opacity=".9"/>
      <ellipse cx="258" cy="100" rx="8" ry="8" fill="#c1440e" opacity=".8"/>
      <ellipse cx="310" cy="100" rx="14" ry="14" fill="#e8ac5e" opacity=".8"/>
      <line x1="40" y1="100" x2="320" y2="100" stroke="rgba(255,255,255,.1)" stroke-width="1"/>`,
    4: `<!-- World map simplified -->
      <path d="M20,60 Q60,40 100,55 Q130,45 160,60 Q190,50 230,60 Q260,45 300,55 Q330,50 345,65 L345,150 Q300,165 260,155 Q220,165 180,155 Q140,165 100,155 Q60,165 20,150 Z" fill="#2d8a4e" opacity=".7"/>
      <path d="M100,55 Q120,70 140,65 Q160,75 180,65 Q200,70 220,60" stroke="none" fill="#3aa862" opacity=".5"/>
      <rect x="20" y="150" width="325" height="40" fill="#1a6b9a" opacity=".6"/>`,
    7: `<!-- Oceans -->
      <rect x="0" y="0" width="360" height="200" fill="#1a6b9a" opacity=".4"/>
      <path d="M20,80 Q80,60 140,75 Q200,60 260,80 Q310,65 345,80 L345,130 Q310,120 260,130 Q200,120 140,130 Q80,120 20,130Z" fill="#2d8a4e" opacity=".6"/>
      <path d="M60,100 Q100,90 140,100 Q180,90 220,100" stroke="#4ade80" stroke-width="1" fill="none" opacity=".5"/>`,
    default: `<!-- Generic geographic pattern -->
      <path d="M0,${H/2} Q${W/4},${H/4} ${W/2},${H/2} Q${3*W/4},${3*H/4} ${W},${H/2}" stroke="rgba(255,255,255,.15)" stroke-width="2" fill="none"/>
      <circle cx="${W/2}" cy="${H/2}" r="${H/3}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
      <circle cx="${W/2}" cy="${H/2}" r="${H/5}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="1"/>`
  };

  const pattern = patterns[t.id] || patterns.default;

  let dotsSVG = '';
  dots.forEach((d,i)=>{
    const cx = (d.x/100)*W;
    const cy = (d.y/100)*H;
    dotsSVG += `
      <g id="sdot${i}" onclick="tapDot(${topicIdx},${i})" style="cursor:pointer">
        <circle cx="${cx}" cy="${cy}" r="14" fill="#f59e0b" stroke="white" stroke-width="2.5" opacity=".95" class="sdot-circle"/>
        <text x="${cx}" y="${cy+5}" text-anchor="middle" fill="white" font-size="11" font-weight="800" font-family="Nunito">${i+1}</text>
      </g>`;
  });

  return `<svg viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;border-radius:10px">
    <rect width="${W}" height="${H}" fill="${bg}"/>
    ${pattern}
    <!-- Grid lines -->
    <line x1="0" y1="${H/2}" x2="${W}" y2="${H/2}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <line x1="${W/2}" y1="0" x2="${W/2}" y2="${H}" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    ${dotsSVG}
  </svg>`;
}

// Update tapDot to work with SVG dots
const _origTapDot = window.tapDot;
window.tapDotSVG = function(topicIdx, dotIdx){
  tapDot(topicIdx, dotIdx);
};

function updateSVGDot(dotIdx, state){
  const g = document.getElementById('sdot'+dotIdx);
  if(!g) return;
  const circle = g.querySelector('circle');
  if(!circle) return;
  if(state==='ok') { circle.setAttribute('fill','#16a34a'); }
  else if(state==='ko') { circle.setAttribute('fill','#ef4444'); }
  else { circle.setAttribute('fill','#f59e0b'); }
}

function toggleLang(){
  ST.lang=ST.lang==='kk'?'ru':'kk';
  document.getElementById('langBtn').textContent=ST.lang==='kk'?'РУС':'ҚАЗ';
  document.getElementById('nb0l').textContent=ST.lang==='kk'?'Тақырыптар':'Темы';
  document.getElementById('nb1l').textContent=ST.lang==='kk'?'Профиль':'Профиль';
  if(ST.view==='detail') openDetailAsync(ST.detIdx);
  else renderTab();
}
